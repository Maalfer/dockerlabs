<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BunkerLabs{% endblock %}</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/bunkerlabs.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='images/logos/logo.png') }}" type="image/png">

    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-XXXXXXXXXX');
    </script>
    <meta name="csrf-token" content="{{ csrf_token }}">
</head>

<body>
    <header>
        <div class="logo">
            <span class="logo-mark">BL</span>
            <span class="logo-text">BunkerLabs</span>
        </div>

        <nav class="nav-links">
            <a href="{{ url_for('index') }}">DockerLabs</a>
            <a href="{{ url_for('bunkerlabs.bunkerlabs_home') }}" class="active">Bunker</a>
            <a href="https://elrincondelhacker.es" target="_blank">Academia</a>
        </nav>

        <!-- NUEVO: info del usuario que ha accedido al bunker -->
        <div class="nav-user">
            {% if session.get('bunkerlabs_nombre') %}
            <span class="user-pill">
                <i class="bi bi-person-badge"></i>
                Acceso: {{ session.get('bunkerlabs_nombre') }}
            </span>
            {% else %}
            <span class="user-pill user-pill-anon">
                <i class="bi bi-shield-lock"></i>
                Acceso mediante token
            </span>
            {% endif %}
        </div>

        <div class="nav-actions">
            <a href="https://discord.gg/" target="_blank" class="icon-link">
                <i class="bi bi-discord"></i>
            </a>
            <a href="https://t.me/" target="_blank" class="icon-link">
                <i class="bi bi-telegram"></i>
            </a>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="bunker-footer">
        <div class="footer-content">
            <div class="footer-icons">
                <a href="https://discord.gg/" target="_blank" class="footer-icon">
                    <i class="bi bi-discord"></i>
                </a>
                <a href="https://www.linkedin.com/" target="_blank" class="footer-icon">
                    <i class="bi bi-linkedin"></i>
                </a>
                <a href="https://t.me/" target="_blank" class="footer-icon">
                    <i class="bi bi-telegram"></i>
                </a>
            </div>
            <div class="footer-divider"></div>
            <p>© Copyright BunkerLabs</p>
            <p>By <a href="#" class="footer-link">El Pingüino de Mario</a> 🐧</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function openGestionWriteupsModal() {
            const modal = document.getElementById('gestionWriteupsModal');
            if (modal) {
                modal.style.display = 'flex';
            }
        }

        function closeGestionWriteupsModal() {
            const modal = document.getElementById('gestionWriteupsModal');
            if (modal) {
                modal.style.display = 'none';
            }
        }

        document.addEventListener('DOMContentLoaded', function () {
            const modal = document.getElementById('gestionWriteupsModal');
            if (!modal) return;
            modal.addEventListener('click', function (e) {
                if (e.target === modal) closeGestionWriteupsModal();
            });
        });
    </script>

    {% block scripts %}{% endblock %}
</body>

</html>
