{% extends "dockerlabs/base.html" %}

{% block title %}Recuperar contraseña - DockerLabs{% endblock %}

{% block content %}
<div class="container" style="padding-top: 80px; max-width: 500px;">
    <h2>Recuperar contraseña</h2>

    <div class="alert alert-danger mt-3" id="recover-error" style="display: none;"></div>
    
    <div id="recover-success-container" style="display: none;">
        <div class="alert alert-success mt-3" id="recover-success"></div>
        <a href="{{ url_for('auth.login') }}" class="btn btn-primary mt-3">Ir a Iniciar sesión</a>
    </div>

    <form id="recover-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token_value }}">

        <div class="mb-3">
            <label for="username" class="form-label">Usuario</label>
            <input type="text" name="username" id="username" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="pin" class="form-label">PIN de recuperación</label>
            <input type="text" name="pin" id="pin" class="form-control" required autocomplete="off">
        </div>

        <div class="mb-3">
            <label for="password" class="form-label">Nueva contraseña</label>
            <input type="password" name="password" id="password" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="password2" class="form-label">Repetir nueva contraseña</label>
            <input type="password" name="password2" id="password2" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary">Restablecer contraseña</button>
    </form>
</div>

<script nonce="{{ g.csp_nonce }}">
document.addEventListener("DOMContentLoaded", function() {
    const form = document.getElementById("recover-form");
    const errorBox = document.getElementById("recover-error");
    const successContainer = document.getElementById("recover-success-container");
    const successBox = document.getElementById("recover-success");
    
    form.addEventListener("submit", async function(e) {
        e.preventDefault();
        
        errorBox.style.display = "none";
        successContainer.style.display = "none";
        
        const data = {
            username: form.username.value,
            pin: form.pin.value,
            password: form.password.value,
            password2: form.password2.value
        };
        const csrfToken = form.csrf_token.value;
        
        try {
            const response = await fetch("/api/auth/recover", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": csrfToken
                },
                body: JSON.stringify(data)
            });
            
            const result = await response.json();
            
            if (response.ok && result.success) {
                form.style.display = "none";
                successContainer.style.display = "block";
                successBox.textContent = result.message || "Contraseña actualizada correctamente.";
            } else {
                errorBox.style.display = "block";
                errorBox.textContent = result.message || "Error al recuperar contraseña.";
            }
        } catch (error) {
            errorBox.style.display = "block";
            errorBox.textContent = "Error de conexión con el servidor.";
        }
    });
});
</script>
{% endblock %}
